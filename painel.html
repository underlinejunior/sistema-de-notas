<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Notas | Painel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="mensagens" class="mensagens"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-topo">
        <div class="marca-icone pequeno marca-logo"><img src="assets/logo.png" alt="Logo do sistema" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" /><span>SN</span></div>
        <div>
          <strong>Sistema de Notas</strong>
          <span id="perfil-label">Carregando...</span>
        </div>
      </div>
      <nav id="menu-principal" class="menu"></nav>
    </aside>

    <div class="conteudo-layout">
      <header class="topbar">
        <button id="botao-menu-mobile" class="botao-menu" aria-label="Abrir menu" title="Abrir menu">
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
        <div class="topbar-titulo">
          <h1 id="titulo-pagina">Painel</h1>
          <p id="subtitulo-pagina">Carregando suas informações...</p>
        </div>
        <div class="usuario-logado">
          <div id="menu-usuario" class="menu-usuario">
            <button
              id="botao-menu-usuario"
              class="menu-usuario-gatilho"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="opcoes-menu-usuario"
            >
              <span id="usuario-nome" class="usuario-nome"><i class="fa-regular fa-circle-user" aria-hidden="true"></i><span></span></span>
              <i class="fa-solid fa-chevron-down menu-usuario-seta" aria-hidden="true"></i>
            </button>

            <div id="opcoes-menu-usuario" class="menu-usuario-opcoes" role="menu" hidden>
              <button id="botao-meu-perfil" class="menu-usuario-item" type="button" role="menuitem">
                <i class="fa-regular fa-id-card" aria-hidden="true"></i>
                <span>Meu perfil</span>
              </button>
              <button id="botao-alterar-senha" class="menu-usuario-item" type="button" role="menuitem">
                <i class="fa-solid fa-key" aria-hidden="true"></i>
                <span>Alterar senha</span>
              </button>
              <div class="menu-usuario-separador" aria-hidden="true"></div>
              <button id="botao-sair" class="menu-usuario-item menu-usuario-item-perigo" type="button" role="menuitem">
                <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
                <span>Sair</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main id="conteudo" class="conteudo">
        <div class="estado-vazio">
          <div class="spinner"></div>
          <p>Carregando sistema...</p>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
